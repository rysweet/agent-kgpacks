name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN. All jobs here only read the repo
# (checkout) and upload coverage; none need write access.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_SYSTEM_PYTHON: "false"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - run: uv pip install -r backend/requirements.txt
      - name: Check formatting
        run: uv run ruff format --check bootstrap/ backend/
      - name: Lint
        run: uv run ruff check bootstrap/ backend/
      - name: Type check
        run: uv run pyright bootstrap/src bootstrap/schema backend/ || true

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev,test,build]"
      - name: Run tests with coverage
        run: |
          uv run pytest bootstrap/src/*/tests \
            --cov=bootstrap/src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v --timeout=60
      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  schema-validation:
    name: Validate LadybugDB Schema
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv
      - run: uv pip install -e ".[test]"
      - run: uv run python bootstrap/schema/ryugraph_schema.py --db /tmp/test_schema.db --drop

  pack-tests:
    name: Pack Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev,test,build]"
      - name: Run pack unit tests
        run: |
          uv run pytest tests/packs/ \
            --ignore=tests/packs/eval/test_integration.py \
            --cov=wikigr/packs \
            --cov-report=term-missing \
            --cov-report=xml:pack-coverage.xml \
            -v --timeout=60
      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        if: matrix.python-version == '3.12'
        with:
          file: ./pack-coverage.xml
          fail_ci_if_error: false

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: [lint, schema-validation]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv
      - run: uv pip install -e ".[dev,test]"
      - name: Run integration tests
        run: |
          uv run pytest tests/packs/eval/test_integration.py \
            -v -m integration --timeout=120 \
            --cov=wikigr/packs --cov-report=xml:integration-coverage.xml

  documentation:
    name: Check Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - name: Validate documentation structure
        run: |
          exit_code=0
          for module in bootstrap/src/*/; do
            module_name=$(basename "$module")
            if [ "$module_name" = "__pycache__" ]; then continue; fi
            if [ ! -f "$module/README.md" ]; then
              echo "ERROR: Missing README.md for module: $module"
              exit_code=1
            fi
          done
          while IFS= read -r line; do
            doc_path=$(echo "$line" | grep -oP 'bootstrap/docs/[a-zA-Z0-9_-]+\.md' || true)
            if [ -n "$doc_path" ] && [ ! -f "$doc_path" ]; then
              echo "ERROR: README.md references non-existent doc: $doc_path"
              exit_code=1
            fi
          done < README.md
          exit $exit_code

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv
      - run: uv pip install pre-commit
      - name: Run pre-commit (skip pyright, run separately in lint job)
        run: SKIP=pyright uv run pre-commit run --all-files

  backend-test:
    name: Backend API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv
      - run: uv pip install -e ".[test]" && uv pip install -r backend/requirements.txt
      - run: uv run pytest backend/tests/ -v

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test -- --run
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Verify lockfile matches pyproject (no relocking)
        run: uv lock --check
      - name: Export exact locked dependency pins
        run: |
          uv export --frozen --format requirements-txt \
            --no-emit-project --no-hashes > audit-requirements.txt
      - name: Audit locked dependencies for known vulnerabilities
        # pip-audit fails the build on any unignored advisory. The ignores below
        # are the only advisories with no in-range fix; each is documented and is
        # not exploitable in this project's usage:
        #   torch  CVE-2025-3000 / PYSEC-2025-194 (DB aliases of the same issue)
        #          and PYSEC-2026-139: no patched torch release is published
        #          upstream; both require local torch.jit / pt2-loader access and
        #          are not reachable from packaged usage or CI.
        #   pytest CVE-2025-71176: dev/test-only tool (never shipped); the fix is
        #          pytest 9.0.3, outside the supported <9.0.0 range.
        # Re-audit and drop an ID here as soon as an in-range fix lands.
        run: |
          uvx --from 'pip-audit>=2.7.0,<3.0.0' pip-audit \
            --requirement audit-requirements.txt \
            --ignore-vuln CVE-2025-3000 \
            --ignore-vuln PYSEC-2025-194 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln CVE-2025-71176 \
            --desc
